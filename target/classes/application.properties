# ==================== 챈혰짜책쩔혰챕혚혥챌쩍짰 ====================
app.log.level=INFO
app.log.stdoutPattern=%d{yyyy-MM-dd HH:mm:ss.SSS} %highlight(%-5level) %-17black(%thread) %-82green(%logger{70}-%line) %highlight(%msg) %highlight(%ex){red}%n
app.log.filePattern=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
app.log.filePath=logs
app.log.maxHistory=30
app.log.totalSizeCap=10GB

